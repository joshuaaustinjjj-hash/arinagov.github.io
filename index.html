<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #222;
            color: white;
            text-align: center;
        }

        .container {
            padding: 30px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            color: #ccc;
        }

        .icon {
            font-size: 80px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 35px;
            }

            p {
                font-size: 16px;
            }

            .icon {
                font-size: 60px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🚧</div>
        <h1>Under Construction</h1>
        <p>This website is currently being built.<br>
        Please check back later!</p>
    </div>
</body>
</html>
