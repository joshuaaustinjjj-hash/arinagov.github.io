<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website Under Construction</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #111827, #374151);
    color: white;
    text-align: center;
}

.container {
    padding: 30px;
    max-width: 500px;
}

.logo {
    font-size: 60px;
    margin-bottom: 20px;
}

h1 {
    font-size: 40px;
    margin: 10px 0;
}

p {
    font-size: 18px;
    color: #d1d5db;
}

.progress {
    width: 100%;
    height: 15px;
    background: #4b5563;
    border-radius: 20px;
    overflow: hidden;
    margin: 30px 0;
}

.bar {
    width: 70%;
    height: 100%;
    background: white;
    border-radius: 20px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #111827;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

@media(max-width:600px){
    h1 {
        font-size: 32px;
    }

    .logo {
        font-size: 50px;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">🚧</div>

    <h1>Website Under Construction</h1>

    <p>
        We are working hard to create something amazing.
        Please check back soon!
    </p>

    <div class="progress">
        <div class="bar"></div>
    </div>

    <p>70% Completed</p>

    <button>Return Later</button>

</div>

</body>
</html>
