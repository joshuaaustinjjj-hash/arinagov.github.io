<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>United Empire of Arina</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a1a, #2f2f2f);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            margin: 0 0 20px;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
            color: #dddddd;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 32px;
            }

            p {
                font-size: 18px;
            }

            .icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🚧</div>

    <h1>United Empire of Arina</h1>

    <p>
        This is the official website of the <strong>United Empire of Arina</strong>.<br><br>
        Our website is currently <strong>under construction</strong> as we work to bring you new information and services.
        <br><br>
        Thank you for your patience. Please check back soon.
    </p>
</div>

</body>
</html>
